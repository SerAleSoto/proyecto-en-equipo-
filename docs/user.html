<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Usuarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }

        .consulta {
            text-align: center;
            margin: 2rem;
        }

        .consulta input,
        .consulta button {
            padding: 0.5rem;
            margin: 0.5rem;
        }

        .resultado {
            background-color: #fff;
            margin: 2rem auto;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            width: 80%;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <h1>Trabajo en equipo - Consulta de Cliente particular</h1>

        <nav>
            <ul>
                <a href="index.html">Inicio</a>  <br>
                <a href="user.html">Proyectos</a>
            </ul>
        </nav>
    </header>

    <main>
        <div class="consulta">
            <label for="userId">Ingrese ID de usuario (1-10):</label>
            <input type="number" id="userId" min="1" max="10">
            <button onclick="consultarUsuario()">Consultar</button>
        </div>

        <div id="resultado" class="resultado"></div>
    </main>

    <footer>
        <p>&copy; 2026 Trabajo en equipo</p>
    </footer>

    <!-- Aquí va el JavaScript -->
    <script>
        async function consultarUsuario() {
            const userId = document.getElementById("userId").value;
            const resultadoDiv = document.getElementById("resultado");

            if (!userId) {
                resultadoDiv.innerHTML = "<p>Por favor ingrese un ID válido.</p>";
                return;
            }

            try {
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${userId}`);
                if (!response.ok) {
                    throw new Error("Usuario no encontrado");
                }
                const usuario = await response.json();

                // Mostrar todos los campos del objeto usuario
                let contenido = "<h2>Datos del Usuario</h2><ul>";
                for (const [clave, valor] of Object.entries(usuario)) {
                    if (typeof valor === "object" ) {
                        if (clave !== "company" && clave !== "address") {
                        contenido += `<li><strong>${clave}:</strong> ${JSON.stringify(valor, null, 2)}</li>`;
                        }   
                    } 
                    
                    // else {
                    //     contenido += `<li><strong>${clave}:</strong> ${valor}</li>`;
                    // }
                }
                contenido += "</ul>";

                resultadoDiv.innerHTML = contenido;
            } catch (error) {
                resultadoDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
    </script>
</body>

</html>
